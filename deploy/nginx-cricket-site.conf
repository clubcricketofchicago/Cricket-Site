# Club Cricket of Chicago — nginx reverse proxy for the Next.js frontend.
#
# Install:
#   sudo cp deploy/nginx-cricket-site.conf /etc/nginx/sites-available/cricket-site
#   sudo ln -s /etc/nginx/sites-available/cricket-site /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d clubcricketofchicago.com -d www.clubcricketofchicago.com
#
# certbot adds the :443 / SSL server block automatically and redirects :80 -> :443.

# apex -> www  (keeps the current canonical host: www.clubcricketofchicago.com)
server {
    listen 80;
    server_name clubcricketofchicago.com;
    return 301 https://www.clubcricketofchicago.com$request_uri;
}

server {
    listen 80;
    server_name www.clubcricketofchicago.com;

    # Next.js runs on 127.0.0.1:3000 (the systemd service)
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
